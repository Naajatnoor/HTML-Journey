<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning how to create a form using HTML</title>
</head>
<body>
    <h1>Learning how to create a form using HTML</h1>
<form action="index.html">
<label >Name:</label>

<input type="text" name="name" placeholder="Enter your name"><br>
<br>    

<label ">Age: </label>

<input type="number" name="age" placeholder="Enter your age"><br>    
<br>     

<label>Birth date: </label>
<input type="date" name ="birthdate" ><br>
<br>
<label>Country: </label>

<select id="country" name="country" placeholder="Select your country">
    <option >Select your country</option>
    <option value="newyork">New York</option>
    <option value="losangeles">Los Angeles</option>
    <option value="chicago">Chicago</option>
    <option value="houston">Houston</option>
    <option value="miami">Miami</option>     
     <option value="Bangladesh">Bangladesh</option>
    <option value="Australia">Australia</option>
    <option value="Canada">Canada</option>
    <option value="Germany">Germany</option>
    <option value="America">America</option>            
</select>
<br>
<br>
<label >Gender: </label>
<select id="gender" name="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
</select>
<br>
<br>    
<label type="email" > Email: </label>
<input type="email" name="email" placeholder="Enter your email"><br>
<br>
<label type="password">Password: </label>
<input type="password" name="password" placeholder="Enter your password"><br>
<br>

<a href="index.html">
    <button type="submit" >Submit</button>
</a>

   </form>                                                      
</body>
</html>
